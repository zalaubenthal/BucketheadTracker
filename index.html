<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Buckethead Pikes Tracker</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#111;
    color:white;
    text-align:center;
    margin:0;
    padding:0;
}

/* HEADER */

.header{
    padding:30px 0 10px 0;
}

.logo{
    width:120px;
    height:auto;
    display:block;
    margin:auto;
}

h1{
    margin-top:10px;
}

/* RANDOM PIKE SECTION */

.random-section{
    margin-top:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
}

button{
    padding:10px 16px;
    font-size:16px;
    cursor:pointer;
}

input, textarea, select{
    padding:6px;
    font-size:14px;
}

#pikeDisplay{
    font-size:20px;
    font-weight:bold;
}

/* HISTORY */

.history{
    margin-top:40px;
}

.history-item{
    background:#222;
    padding:12px;
    margin:8px auto;
    width:420px;
    border-radius:6px;
}

.history-buttons button{
    margin:4px;
}

</style>
</head>


<body>

<div class="header">
<img src="IMG_2763.png" class="logo">
<h1>Buckethead Pikes Tracker</h1>
</div>


<div class="random-section">

<button onclick="generateRandomPike()">Generate Random Pike</button>

<div id="pikeDisplay"></div>

<button onclick="openYouTube()">Find on YouTube</button>

<input id="pikeNameField" placeholder="Pike Name">

<label>Rating</label>
<select id="rating">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
</select>

<textarea id="comment" placeholder="Comment"></textarea>

<button onclick="savePike()">Save Listened Pike</button>

</div>



<div class="history">

<h2>Listened Pikes</h2>

<div id="historyList"></div>

</div>



<script>

const pikes = [
{num:1,name:"It's Alive"},
{num:2,name:"Empty Space"},
{num:3,name:"3 Foot Clearance"},
{num:4,name:"Underground Chamber"},
{num:5,name:"Look Up There"},
{num:13,name:"Pike 13"},
{num:51,name:"Claymation Courtyard"},
{num:65,name:"Hold Me Forever"},
{num:95,name:"Northern Lights"},
{num:150,name:"Heaven is your Home"}
];

let currentPike = null;



function generateRandomPike(){

const random = pikes[Math.floor(Math.random()*pikes.length)];

currentPike = random;

const display = `Pike ${random.num} - ${random.name}`;

document.getElementById("pikeDisplay").innerText = display;

document.getElementById("pikeNameField").value = display;

}



function openYouTube(){

if(!currentPike) return;

const search = encodeURIComponent(`Buckethead Pike ${currentPike.num} ${currentPike.name}`);

window.open(`https://www.youtube.com/results?search_query=${search}`);

}



function savePike(){

if(!currentPike) return;

const rating = document.getElementById("rating").value;
const comment = document.getElementById("comment").value;

const data = {
num:currentPike.num,
name:currentPike.name,
rating:rating,
comment:comment
};

let history = JSON.parse(localStorage.getItem("pikeHistory")||"[]");

history.push(data);

localStorage.setItem("pikeHistory",JSON.stringify(history));

loadHistory();

}



function loadHistory(){

let history = JSON.parse(localStorage.getItem("pikeHistory")||"[]");

const container = document.getElementById("historyList");

container.innerHTML="";

history.forEach((pike,index)=>{

const div = document.createElement("div");

div.className="history-item";

div.innerHTML = `
<b>Pike ${pike.num} - ${pike.name}</b><br>
Rating: ${pike.rating}<br>
Comment: ${pike.comment}<br>
<div class="history-buttons">
<button onclick="editPike(${index})">Edit</button>
<button onclick="removePike(${index})">Remove</button>
</div>
`;

container.appendChild(div);

});

}



function removePike(index){

let history = JSON.parse(localStorage.getItem("pikeHistory")||"[]");

history.splice(index,1);

localStorage.setItem("pikeHistory",JSON.stringify(history));

loadHistory();

}



function editPike(index){

let history = JSON.parse(localStorage.getItem("pikeHistory")||"[]");

const newRating = prompt("New rating (0-5)",history[index].rating);
const newComment = prompt("New comment",history[index].comment);

history[index].rating = newRating;
history[index].comment = newComment;

localStorage.setItem("pikeHistory",JSON.stringify(history));

loadHistory();

}



loadHistory();

</script>


</body>
</html>
